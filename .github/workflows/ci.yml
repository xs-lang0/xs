name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    if: "!startsWith(github.ref, 'refs/tags/')"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: make test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make test

  build-wasm:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VERSION=25
          WASI_VERSION_FULL=${WASI_VERSION}.0
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          tar xf wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          sudo mv wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux /opt/wasi-sdk

      - name: Build WASM
        run: make wasm

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: xs-linux-x86_64
          - os: macos-latest
            name: xs-macos-x86_64
          - os: windows-latest
            name: xs-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build release (Unix)
        if: runner.os != 'Windows'
        run: make release

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make release

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv xs ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv xs.exe ${{ matrix.name }}

      - name: Zip Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.name }} -DestinationPath xs-windows-x86_64.zip

      - name: Upload to release (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            xs-windows-x86_64.zip

  wasm:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VERSION=25
          WASI_VERSION_FULL=${WASI_VERSION}.0
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          tar xf wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          sudo mv wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux /opt/wasi-sdk

      - name: Build WASM
        run: make wasm

      - name: Upload WASM to release
        uses: softprops/action-gh-release@v2
        with:
          files: xs.wasm

      - name: Notify static repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xs-lang0/static/dispatches \
            -d '{"event_type":"release"}' || true
